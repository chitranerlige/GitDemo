name: RestAssured API Automation CI

on:
  push:
    branches: [ "master" ]
    paths-ignore:
      - '.github/**'     # Prevents the deployment commit from re-triggering the test
      - 'README.md'      # Optional: Stops builds if you are just editing documentation
  pull_request:
    branches: [ "master" ]
    paths-ignore:
      - '.github/**'
      - 'README.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    name: Execute API Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Run Tests with Maven
      run: mvn clean test

    - name: Upload Test Reports Artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: Extent-Test-Reports
        path: reports/
        retention-days: 30

    - name: Deploy Report to GitHub Pages
      if: always()
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./reports
