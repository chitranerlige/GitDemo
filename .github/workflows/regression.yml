name: RestAssured API Automation CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write      # Gives official permission to host HTML data
  id-token: write   # Secure token required for native hosting

jobs:
  test:
    name: Execute API Tests
    # Security Rule: Only run if a human updates the code, completely blocking bot loops
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Run Tests with Maven
      run: mvn clean test

    # Official GitHub Action: Uploads the directory as a static artifact securely
    - name: Upload Pages Artifact
      if: always()
      uses: actions/upload-pages-artifact@v3
      with:
        path: ./reports

    # Official GitHub Action: Publishes your pages data without creating git commit history loops
    - name: Deploy to GitHub Pages
      if: always()
      id: deployment
      uses: actions/deploy-pages@v4
