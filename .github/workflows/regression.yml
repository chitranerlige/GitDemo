name: RestAssured API Automation CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

permissions:
  contents: write # Crucial permission required to publish to GitHub Pages

jobs:
  test:
    name: Execute API Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Run Tests with Maven
      run: mvn clean test

    - name: Upload Test Reports Artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: Extent-Test-Reports
        path: reports/
        retention-days: 30

    # New Step: Automatically publish HTML report to gh-pages branch
    - name: Deploy Report to GitHub Pages
      if: always()
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./reports
