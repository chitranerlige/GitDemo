name: Automation Regression Suite

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  schedule:
    - cron: '0 2 * * *'

# ⚠️ CRITICAL PERMISSION ADDITION FOR DEPLOYMENT:
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test-execution:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4.2.2

    - name: Set up JDK 17
      uses: actions/setup-java@v4.3.0
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    - name: Execute TestNG Tests
      run: mvn clean test

    - name: Upload Test Report Artifacts
      if: always()
      uses: actions/upload-artifact@v4.4.3
      with:
        name: test-ng-results
        path: target/surefire-reports/

    - name: Upload Extent Report Artifacts
      if: always()                  
      uses: actions/upload-artifact@v4.4.3
      with:
        name: extent-test-report
        path: reports/              

    - name: Deploy Extent Report to GitHub Pages
      if: always()
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: reports/
