name: Automation Regression Suite

# 1. Define when the pipeline runs (Triggers)
on:
  push:
    branches: [ "main", "master" ]  # Runs every time you push code to main branch
  pull_request:
    branches: [ "main", "master" ]  # Runs when someone opens a PR
  schedule:
    - cron: '0 2 * * *'             # Nightly build trigger: Runs automatically every day at 2:00 AM UTC

jobs:
  test-execution:
    runs-on: ubuntu-latest          # Spins up a fresh Linux virtual machine

    steps:
    # Step 1: Checkout your repository code onto the virtual machine
    - name: Checkout Code
      uses: actions/checkout@v4

    # Step 2: Set up Java Environment
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'              # Caches dependencies so future runs are faster

    # Step 3: Run the Maven automation suite
    - name: Execute TestNG Tests
      run: mvn clean test

    # Step 4: Save your test reports so they don't disappear when the machine shuts down
    - name: Upload Test Report Artifacts
      if: always()                  # Ensures reports upload even if tests fail
      uses: actions/upload-artifact@v4
      with:
        name: test-ng-results
        path: target/surefire-reports/