name: RestAssured API Automation CI

# Controls when the workflow will run
on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch: # Allows you to run this workflow manually from the Actions tab

jobs:
  test:
    name: Execute API Tests
    runs-on: ubuntu-latest

    steps:
    # Step 1: Checkout the code from your repository
    - name: Checkout Repository
      uses: actions/checkout@v4

    # Step 2: Set up Java 17 environment
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    # Step 3: Run the RestAssured tests using Maven
    - name: Run Tests with Maven
      run: mvn clean test

    # Step 4: Archive Extent Reports so they can be downloaded after the run
    - name: Upload Test Reports Artifact
      if: always() # This ensures reports are uploaded even if tests fail
      uses: actions/upload-artifact@v4
      with:
        name: Extent-Test-Reports
        path: reports/
        retention-days: 30
